<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-NetGuard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1a;
    --surface-2: #19233a;
    --border: #263354;
    --text: #e8eef7;
    --text-muted: #7c8aa6;
    --accent: #ff9554;
    --accent-2: #5eead4;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  canvas#net {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    opacity: 0.5;
  }
  .window {
    position: relative;
    z-index: 1;
    width: min(640px, 92vw);
    background: rgba(17, 26, 43, 0.78);
    border: 1px solid var(--border);
    border-radius: 10px;
    backdrop-filter: blur(6px);
    box-shadow: 0 30px 80px -40px rgba(0,0,0,0.8);
    overflow: hidden;
  }
  .titlebar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  .dots { display: flex; gap: 7px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green { background: #28c840; }
  .path {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }
  .status {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent-2);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status::before {
    content: '';
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(94,234,212,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(94,234,212,0); }
    100% { box-shadow: 0 0 0 0 rgba(94,234,212,0); }
  }
  .content {
    padding: 56px 44px 48px;
    text-align: center;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 18px;
  }
  .eyebrow span { color: var(--accent); }
  h1 {
    font-family: var(--mono);
    font-weight: 600;
    font-size: clamp(2.2rem, 6vw, 3.4rem);
    letter-spacing: -0.01em;
    margin-bottom: 18px;
  }
  .cursor {
    display: inline-block;
    width: 0.5ch;
    background: var(--accent);
    margin-left: 4px;
    animation: blink 1.1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  p.tagline {
    color: var(--text-muted);
    font-size: clamp(0.95rem, 2vw, 1.05rem);
    line-height: 1.6;
    max-width: 440px;
    margin: 0 auto 36px;
  }
  .links {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .links a {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 13px 22px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
  }
  .links a:hover, .links a:focus-visible {
    transform: translateY(-2px);
    outline: none;
  }
  .links a.youtube:hover, .links a.youtube:focus-visible { border-color: var(--accent); color: var(--accent); }
  .links a.github:hover, .links a.github:focus-visible { border-color: var(--accent-2); color: var(--accent-2); }
  .links svg { width: 16px; height: 16px; flex-shrink: 0; }

  @media (max-width: 480px) {
    .content { padding: 40px 24px; }
    .links { flex-direction: column; }
    .links a { justify-content: center; }
  }
  @media (prefers-reduced-motion: reduce) {
    .cursor, .status::before { animation: none; }
    canvas#net { display: none; }
  }
</style>
</head>
<body>
<canvas id="net"></canvas>
<div class="window">
  <div class="titlebar">
    <div class="dots">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>
    <div class="path">ai-netguard@soc:~</div>
    <div class="status">monitoring</div>
  </div>
  <div class="content">
    <div class="eyebrow"><span>//</span> network intrusion detection system</div>
    <h1>AI-NetGuard<span class="cursor">&nbsp;</span></h1>
    <p class="tagline">
      An AI-powered system that watches live network traffic, flags malicious flows in real time, and blocks them automatically.
    </p>
    <div class="links">
      <a class="youtube" href="https://www.youtube.com/@AINetGuard" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8ZM9.6 15.5v-7l6.1 3.5Z"/></svg>
        Watch on YouTube
      </a>
      <a class="github" href="https://github.com/youssefmoham2040-byte/AI-NetGuard" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1.1-.8.1-.7.1-.7 1.2.1 1.9 1.3 1.9 1.3 1.1 1.9 2.9 1.3 3.6 1 .1-.8.4-1.3.8-1.6-2.6-.3-5.4-1.3-5.4-5.9 0-1.3.5-2.4 1.3-3.2-.1-.3-.6-1.6.1-3.2 0 0 1-.3 3.4 1.2a11.4 11.4 0 0 1 6 0c2.3-1.6 3.3-1.2 3.3-1.2.7 1.6.2 2.9.1 3.2.8.9 1.3 2 1.3 3.2 0 4.6-2.8 5.6-5.5 5.9.5.4.8 1.2.8 2.4v3.5c0 .3.2.7.8.6A12 12 0 0 0 12 .5Z"/></svg>
        View on GitHub
      </a>
    </div>
  </div>
</div>
<script>
  const canvas = document.getElementById('net');
  const ctx = canvas.getContext('2d');
  let w, h, nodes;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const NODE_COUNT = Math.max(14, Math.floor((w * h) / 60000));
  nodes = Array.from({ length: NODE_COUNT }, () => ({
    x: Math.random() * w,
    y: Math.random() * h,
    vx: (Math.random() - 0.5) * 0.15,
    vy: (Math.random() - 0.5) * 0.15,
    alert: Math.random() < 0.12,
    alertT: Math.random() * Math.PI * 2
  }));

  const packets = [];
  function spawnPacket() {
    if (nodes.length < 2) return;
    const a = nodes[Math.floor(Math.random() * nodes.length)];
    let b = nodes[Math.floor(Math.random() * nodes.length)];
    let tries = 0;
    while (b === a && tries < 5) { b = nodes[Math.floor(Math.random() * nodes.length)]; tries++; }
    packets.push({ a, b, t: 0, speed: 0.004 + Math.random() * 0.006 });
  }
  setInterval(spawnPacket, 350);

  function draw() {
    ctx.clearRect(0, 0, w, h);

    ctx.lineWidth = 1;
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 220) {
          ctx.strokeStyle = `rgba(124,138,166,${0.12 * (1 - dist / 220)})`;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    for (let i = packets.length - 1; i >= 0; i--) {
      const p = packets[i];
      p.t += p.speed;
      if (p.t >= 1) { packets.splice(i, 1); continue; }
      const x = p.a.x + (p.b.x - p.a.x) * p.t;
      const y = p.a.y + (p.b.y - p.a.y) * p.t;
      ctx.fillStyle = 'rgba(94,234,212,0.7)';
      ctx.beginPath();
      ctx.arc(x, y, 1.6, 0, Math.PI * 2);
      ctx.fill();
    }

    for (const n of nodes) {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > w) n.vx *= -1;
      if (n.y < 0 || n.y > h) n.vy *= -1;

      let color = 'rgba(124,138,166,0.5)';
      let r = 2;
      if (n.alert) {
        n.alertT += 0.03;
        const pulse = (Math.sin(n.alertT) + 1) / 2;
        color = `rgba(255,149,84,${0.35 + pulse * 0.5})`;
        r = 2 + pulse * 1.5;
      }
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
